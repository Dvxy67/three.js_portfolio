<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bientôt disponible — Jean Ardaillou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #07070a;
      --gold:     #c9963a;
      --gold-dim: #a07830;
      --white:    #f0ede6;
      --grey:     #9a98a8;
      --font-display: 'Cormorant Garamond', serif;
      --font-mono:    'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.04;
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 480px;
    }

    .label {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    h1 em {
      font-style: italic;
      color: var(--gold);
    }

    p {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--grey);
      line-height: 1.9;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--gold-dim);
    }

    a.back {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      font-size: 0.78rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid var(--gold-dim);
      padding-bottom: 0.3rem;
      transition: border-color 0.3s, gap 0.3s;
      margin-top: 1rem;
    }

    a.back::before { content: '←'; }
    a.back:hover { border-color: var(--gold); gap: 1.2rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">Jean Ardaillou · Portfolio</div>
    <h1>Bientôt<br><em>disponible.</em></h1>
    <div class="divider"></div>
    <p>Cette page n'est pas encore<br>accessible pour le moment.</p>
    <a href="./index.html" class="back">Retour au portfolio</a>
  </div>
</body>
</html>
